name: Wick
options:
  bundleIdPrefix: com.latenightsw
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  LanternKit:
    path: ../LanternKit

targets:
  Wick:
    type: application
    platform: [macOS, iOS]
    sources:
      - path: Sources/Wick
    dependencies:
      - package: LanternKit
        product: LanternKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.latenightsw.Wick
        PRODUCT_NAME: Wick
        INFOPLIST_FILE: Sources/Wick/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: false
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Sources/Wick/Wick.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Sources/Wick/Wick.entitlements
    info:
      path: Sources/Wick/Info.plist
      properties:
        CFBundleName: Wick
        CFBundleDisplayName: Wick
        CFBundleIdentifier: com.latenightsw.Wick
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Wick
        LSMinimumSystemVersion: "15.0"
        CFBundleDocumentTypes:
          - CFBundleTypeName: Lantern Source
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.latenightsw.lantern-source
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.latenightsw.lantern-source
            UTTypeDescription: Lantern Source File
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - lantern
